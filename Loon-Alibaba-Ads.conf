#!name=阿里 & 腾讯 拦截
#!desc=加入微信 DNS 秒回，解決微信頻繁重試導致的發熱。
#!icon=https://raw.githubusercontent.com/luestr/IconCenter/master/Apps/Alipay.png

[Rewrite]
# --- 微信 DNS 調度 (新增：解決截圖中的瘋狂重試) ---
^https?:\/\/dns\.weixin\.qq\.com\.cn reject-dict

# --- 阿里 & 淘寶 ---
^https?:\/\/.*\.ynuf\.aliapp\.org reject-dict
^https?:\/\/amdc\.alipay\.com reject-dict
^https?:\/\/h-adashx\.ut\.taobao\.com reject-dict
^https?:\/\/mum\.alibabachengdun\.(com|net) reject-dict
^https?:\/\/loggw-ex\.alipay\.com reject-dict
^https?:\/\/umdc\.alibabachengdun\.com reject-dict
^https?:\/\/sjarvis\.taobao\.com reject-dict
^https?:\/\/dualstack-logs\.amap\.com reject-dict
^https?:\/\/yixiu-abtest\.alicdn\.com reject-dict
^https?:\/\/.*\.mmstat\.com reject-dict
^https?:\/\/.*\.log\.aliyuncs\.com reject-dict

[MITM]
hostname = sjarvis.taobao.com, *.sjarvis.taobao.com, amdc.alipay.com, cdn.ynuf.aliapp.org, *.ynuf.aliapp.org, h-adashx.ut.taobao.com, mum.alibabachengdun.com, mum.alibabachengdun.net, loggw-ex.alipay.com, umdc.alibabachengdun.com, dualstack-logs.amap.com, yixiu-abtest.alicdn.com, *.mmstat.com, *.log.aliyuncs.com


