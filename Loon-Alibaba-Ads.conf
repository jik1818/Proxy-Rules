[Rewrite]
# --- 微信 ---
^https?:\/\/dns\.weixin\.qq\.com\.cn reject-200

# --- 支付宝 & 淘宝 ---
^https?:\/\/.*\.ynuf\.aliapp\.org reject-200
^https?:\/\/amdc\.alipay\.com reject-200
^https?:\/\/h-adashx\.ut\.taobao\.com reject-200
^https?:\/\/mum\.alibabachengdun\.(com|net) reject-200
^https?:\/\/loggw-ex\.alipay\.com reject-200
^https?:\/\/umdc\.alibabachengdun\.com reject-200
^https?:\/\/sjarvis\.taobao\.com reject-200
^https?:\/\/dualstack-logs\.amap\.com reject-200
^https?:\/\/yixiu-abtest\.alicdn\.com reject-200
^https?:\/\/.*\.mmstat\.com reject-200
^https?:\/\/.*\.log\.aliyuncs\.com reject-200


[MITM]
hostname = sjarvis.taobao.com, *.sjarvis.taobao.com, amdc.alipay.com, cdn.ynuf.aliapp.org, *.ynuf.aliapp.org, h-adashx.ut.taobao.com, mum.alibabachengdun.com, mum.alibabachengdun.net, loggw-ex.alipay.com, umdc.alibabachengdun.com, dualstack-logs.amap.com, yixiu-abtest.alicdn.com, *.mmstat.com, *.log.aliyuncs.com









