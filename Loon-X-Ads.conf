#!name=X 广告与遥测拦截
#!desc=X 广告与遥测拦截
#!homepage=https://github.com/jik1818/Proxy-Rules
#!author=jik1818
#!icon=

[Rewrite]
# 攔截 Google 崩潰報告傳送
^https?:\/\/crashlyticsreports-pa\.googleapis\.com\/.* reject-dict
# 攔截 X 廣告 API
^https?:\/\/ads-api\.twitter\.com\/.* reject-dict
# 攔截 Crashlytics 配置檢查
^https?:\/\/firebase-settings\.crashlytics\.com\/.* reject-dict
# 攔截 Google 廣告與分析
^https?:\/\/.*\.doubleclick\.net\/.* reject-dict
^https?:\/\/googleads\.g\.doubleclick\.net\/.* reject-dict
^https?:\/\/firebaselogging-pa\.googleapis\.com\/.* reject-dict
# 攔截通用分析
^https?:\/\/app-analytics-services\.com\/.* reject-dict

[MITM]
# 解密域名
hostname = *.doubleclick.net,*.crashlytics.com,ads-api.twitter.com,app-analytics-services.com,firebaselogging-pa.googleapis.com,growth-pa.googleapis.com,clienttracing-pa.googleapis.com,ogads-pa.googleapis.com,crashlyticsreports-pa.googleapis.com
















